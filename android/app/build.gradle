plugins {
    id "com.android.application"
}

android {
    namespace "com.lingshan.guide"
    compileSdk 34

    defaultConfig {
        applicationId "com.lingshan.guide"
        minSdk 24
        targetSdk 34
        versionCode 2
        versionName "1.0.1"
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
