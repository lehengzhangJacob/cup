<svg xmlns="http://www.w3.org/2000/svg" width="1510" height="1210" viewBox="0 0 1510 1210" role="img" aria-labelledby="title desc">
<title id="title">灵山小向导语音问答时序图</title>
<desc id="desc">灵山小向导项目软件工程图</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#173D34"/></marker>
  <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#B75538"/></marker>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#173D34" flood-opacity="0.12"/></filter>
  <style>
    text { font-family: "Noto Sans CJK SC", "Noto Sans CJK JP", "Droid Sans Fallback", sans-serif; fill: #173D34; }
    .title { font-family: "Noto Serif CJK SC", "AR PL UMing CN", serif; font-size: 38px; font-weight: 700; }
    .subtitle { font-size: 18px; fill: #52645E; }
    .label { font-size: 22px; font-weight: 700; }
    .body { font-size: 19px; }
    .small { font-size: 16px; fill: #52645E; }
    .tiny { font-size: 14px; fill: #52645E; }
    .mono { font-family: "DejaVu Sans Mono", monospace; font-size: 16px; }
    .connector { stroke: #173D34; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .association { stroke: #52645E; stroke-width: 2; fill: none; }
    .dashed { stroke: #52645E; stroke-width: 2; stroke-dasharray: 9 8; fill: none; }
  </style>
</defs>
<rect width="1510" height="1210" fill="#FBF8F0"/>
<text x="65" y="62" class="title" text-anchor="start">语音问答与数字人播报时序图</text>
<text x="65" y="94" class="subtitle" text-anchor="start">从录音结束到 WebRTC 数字人开口的流式处理链路</text>
<rect x="35" y="125" width="190" height="62" rx="14" fill="#FFFFFF" stroke="#173D34" stroke-width="2" filter="url(#shadow)"/>
<text x="130" y="164" class="label" text-anchor="middle">游客端</text>
<line x1="130" y1="187" x2="130" y2="1115" stroke="#B9C7C1" stroke-width="2" stroke-dasharray="8 8"/>
<rect x="285" y="125" width="190" height="62" rx="14" fill="#FFFFFF" stroke="#173D34" stroke-width="2" filter="url(#shadow)"/>
<text x="380" y="164" class="label" text-anchor="middle">FastAPI 网关</text>
<line x1="380" y1="187" x2="380" y2="1115" stroke="#B9C7C1" stroke-width="2" stroke-dasharray="8 8"/>
<rect x="535" y="125" width="190" height="62" rx="14" fill="#FFFFFF" stroke="#173D34" stroke-width="2" filter="url(#shadow)"/>
<text x="630" y="164" class="label" text-anchor="middle">GLM-ASR</text>
<line x1="630" y1="187" x2="630" y2="1115" stroke="#B9C7C1" stroke-width="2" stroke-dasharray="8 8"/>
<rect x="785" y="125" width="190" height="62" rx="14" fill="#FFFFFF" stroke="#173D34" stroke-width="2" filter="url(#shadow)"/>
<text x="880" y="164" class="label" text-anchor="middle">RAG + FAISS</text>
<line x1="880" y1="187" x2="880" y2="1115" stroke="#B9C7C1" stroke-width="2" stroke-dasharray="8 8"/>
<rect x="1035" y="125" width="190" height="62" rx="14" fill="#FFFFFF" stroke="#173D34" stroke-width="2" filter="url(#shadow)"/>
<text x="1130" y="164" class="label" text-anchor="middle">GLM 模型服务</text>
<line x1="1130" y1="187" x2="1130" y2="1115" stroke="#B9C7C1" stroke-width="2" stroke-dasharray="8 8"/>
<rect x="1285" y="125" width="190" height="62" rx="14" fill="#FFFFFF" stroke="#173D34" stroke-width="2" filter="url(#shadow)"/>
<text x="1380" y="164" class="label" text-anchor="middle">LiveTalking</text>
<line x1="1380" y1="187" x2="1380" y2="1115" stroke="#B9C7C1" stroke-width="2" stroke-dasharray="8 8"/>
<line x1="130" y1="240" x2="380" y2="240" stroke="#173D34" stroke-width="2.5" marker-end="url(#arrow)"/><text x="255.0" y="228" class="small" text-anchor="middle">1. HTTPS 上传 16 kHz WAV</text>
<line x1="380" y1="320" x2="630" y2="320" stroke="#173D34" stroke-width="2.5" marker-end="url(#arrow)"/><text x="505.0" y="308" class="small" text-anchor="middle">2. 请求语音识别</text>
<line x1="630" y1="400" x2="380" y2="400" stroke="#B75538" stroke-width="2.5" stroke-dasharray="9 7" marker-end="url(#arrow-accent)"/><text x="505.0" y="388" class="small" text-anchor="middle">3. transcript + emotion_event_id</text>
<line x1="380" y1="480" x2="880" y2="480" stroke="#173D34" stroke-width="2.5" marker-end="url(#arrow)"/><text x="630.0" y="468" class="small" text-anchor="middle">4. chat_stream(message, session)</text>
<line x1="880" y1="650" x2="1130" y2="650" stroke="#173D34" stroke-width="2.5" marker-end="url(#arrow)"/><text x="1005.0" y="638" class="small" text-anchor="middle">5. 检索上下文 + 会话历史</text>
<line x1="1130" y1="730" x2="880" y2="730" stroke="#B75538" stroke-width="2.5" stroke-dasharray="9 7" marker-end="url(#arrow-accent)"/><text x="1005.0" y="718" class="small" text-anchor="middle">6. LLM token 流</text>
<line x1="880" y1="810" x2="380" y2="810" stroke="#B75538" stroke-width="2.5" stroke-dasharray="9 7" marker-end="url(#arrow-accent)"/><text x="630.0" y="798" class="small" text-anchor="middle">7. SSE delta + citations</text>
<line x1="380" y1="890" x2="1130" y2="890" stroke="#173D34" stroke-width="2.5" marker-end="url(#arrow)"/><text x="755.0" y="878" class="small" text-anchor="middle">8. 按完整语义句请求 TTS</text>
<line x1="1130" y1="970" x2="380" y2="970" stroke="#B75538" stroke-width="2.5" stroke-dasharray="9 7" marker-end="url(#arrow-accent)"/><text x="755.0" y="958" class="small" text-anchor="middle">9. 流式 PCM</text>
<line x1="380" y1="1050" x2="1380" y2="1050" stroke="#173D34" stroke-width="2.5" marker-end="url(#arrow)"/><text x="880.0" y="1038" class="small" text-anchor="middle">10. 合并 WAV 并加入播报队列</text>
<line x1="1380" y1="1130" x2="130" y2="1130" stroke="#B75538" stroke-width="2.5" stroke-dasharray="9 7" marker-end="url(#arrow-accent)"/><text x="755.0" y="1118" class="small" text-anchor="middle">11. WebRTC 音视频 + 口型</text>
<rect x="755" y="515" width="250" height="105" rx="14" fill="#E7F0EA" stroke="#B9C7C1" stroke-width="2"/>
<text x="880" y="550" class="small" text-anchor="middle"><tspan x="880" dy="0">BGE-M3 / FAISS 检索</tspan><tspan x="880" dy="26">按需 GPU；180 秒回收</tspan></text>
<polyline points="880,515 880,500" fill="none" stroke="#173D34" stroke-width="2.5" stroke-linejoin="round" stroke-dasharray="9 8"/>
<rect x="240" y="835" width="280" height="72" rx="14" fill="#F5EEDC" stroke="#B9C7C1" stroke-width="2"/>
<text x="380" y="866" class="small" text-anchor="middle"><tspan x="380" dy="0">SpeechSegmenter</tspan><tspan x="380" dy="24">完整语义句边界</tspan></text>
<rect x="385" y="1162" width="740" height="34" rx="10" fill="#F8E9E3" stroke="#B75538" stroke-width="2"/>
<text x="755" y="1185" class="small" text-anchor="middle">LLM 生成、TTS 合成与数字人推理流水并行，不等待全文完成</text>
</svg>