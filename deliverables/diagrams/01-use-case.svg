<svg xmlns="http://www.w3.org/2000/svg" width="1450" height="920" viewBox="0 0 1450 920" role="img" aria-labelledby="title desc">
<title id="title">灵山小向导系统用例图</title>
<desc id="desc">灵山小向导项目软件工程图</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#173D34"/></marker>
  <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#B75538"/></marker>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#173D34" flood-opacity="0.12"/></filter>
  <style>
    text { font-family: "Noto Sans CJK SC", "Noto Sans CJK JP", "Droid Sans Fallback", sans-serif; fill: #173D34; }
    .title { font-family: "Noto Serif CJK SC", "AR PL UMing CN", serif; font-size: 38px; font-weight: 700; }
    .subtitle { font-size: 18px; fill: #52645E; }
    .label { font-size: 22px; font-weight: 700; }
    .body { font-size: 19px; }
    .small { font-size: 16px; fill: #52645E; }
    .tiny { font-size: 14px; fill: #52645E; }
    .mono { font-family: "DejaVu Sans Mono", monospace; font-size: 16px; }
    .connector { stroke: #173D34; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .association { stroke: #52645E; stroke-width: 2; fill: none; }
    .dashed { stroke: #52645E; stroke-width: 2; stroke-dasharray: 9 8; fill: none; }
  </style>
</defs>
<rect width="1450" height="920" fill="#FBF8F0"/>
<text x="65" y="62" class="title" text-anchor="start">系统用例图</text>
<text x="65" y="94" class="subtitle" text-anchor="start">游客服务与景区运营两类角色共享同一导览平台</text>
<rect x="225" y="120" width="1000" height="735" rx="24" fill="#FFFFFF" fill-opacity="0.64" stroke="#173D34" stroke-width="3"/>
<text x="725" y="158" class="label" text-anchor="middle">灵山小向导·灵曦</text>
