<ellipse cx="975" cy="660" rx="178" ry="43" fill="#F5EEDC" stroke="#173D34" stroke-width="2.5" filter="url(#shadow)"/><text x="975" y="667" class="body" text-anchor="middle"><tspan x="975" dy="0">查看情绪与满意度报告</tspan></text>
<ellipse cx="975" cy="785" rx="178" ry="43" fill="#F5EEDC" stroke="#173D34" stroke-width="2.5" filter="url(#shadow)"/><text x="975" y="792" class="body" text-anchor="middle"><tspan x="975" dy="0">分析历史游客并获得建议</tspan></text>
</svg>