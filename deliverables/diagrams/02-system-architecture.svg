    .subtitle { font-size: 18px; fill: #52645E; }
    .label { font-size: 22px; font-weight: 700; }
    .body { font-size: 19px; }
    .small { font-size: 16px; fill: #52645E; }
    .tiny { font-size: 14px; fill: #52645E; }
    .mono { font-family: "DejaVu Sans Mono", monospace; font-size: 16px; }
    .connector { stroke: #173D34; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .association { stroke: #52645E; stroke-width: 2; fill: none; }
    .dashed { stroke: #52645E; stroke-width: 2; stroke-dasharray: 9 8; fill: none; }
  </style>
