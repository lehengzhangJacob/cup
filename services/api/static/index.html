<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>灵山小向导 · AI数字人导览</title>
  <style>
    :root {
      --bg0: #0b1814;
      --bg1: #163028;
      --gold: #d4b26a;
      --gold2: #9a7a35;
      --text: #eef5f0;
      --muted: #8aa399;
      --card: rgba(18, 40, 33, 0.88);
      --line: #2f5646;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "PingFang SC", "Noto Sans SC", "Segoe UI", sans-serif;
      background:
        radial-gradient(1200px 500px at 70% -10%, rgba(212,178,106,.18), transparent 55%),
        linear-gradient(165deg, #0b1814 0%, #163028 45%, #0f241c 100%);
    }
    header {
      padding: 16px 20px 8px;
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
    }
    header h1 {
      margin: 0;
      font-size: 22px;
      color: var(--gold);
      letter-spacing: .08em;
      font-weight: 700;
    }
    header p { margin: 4px 0 0; color: var(--muted); font-size: 12px; }
    main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 8px 16px 28px;
      display: grid;
      grid-template-columns: 1.15fr .95fr;
      gap: 14px;
    }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      backdrop-filter: blur(6px);
    }
    .stage {
      position: relative;
      min-height: 520px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 20%, rgba(212,178,106,.16), transparent 42%),
        radial-gradient(circle at 50% 85%, rgba(47,86,70,.55), transparent 55%),
        linear-gradient(180deg, #123028 0%, #0c1c17 100%);
    }
    .stage-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 2px 2px 8px;
      z-index: 3;
    }
    .badge {
      font-size: 12px;
      color: var(--gold);
      border: 1px solid rgba(212,178,106,.4);
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,.25);
    }
    .style-control { position: relative; }
    .stage-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .avatar-picker {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 29px;
      padding: 4px 8px;
      color: var(--pine-deep);
      border: 1px solid rgba(31, 90, 79, .32);
      background: rgba(255, 252, 245, .9);
      font-size: 12px;
      backdrop-filter: blur(8px);
    }
    .avatar-picker select {
      width: auto;
      max-width: 150px;
      padding: 2px 20px 2px 4px;
      color: var(--pine-deep);
      border: 0;
      outline: 0;
      background: transparent;
      font: inherit;
      cursor: pointer;
    }
    .style-trigger {
      width: auto !important;
      padding: 6px 12px !important;
      font-size: 12px !important;
      background: #2f5646 !important;
      color: var(--text) !important;
      font-weight: 600 !important;
    }
    .style-panel {
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      width: 240px;
      background: rgba(12, 28, 23, 0.96);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      z-index: 20;
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
    }
    .style-group { margin-bottom: 10px; }
    .style-group:last-child { margin-bottom: 0; }
    .style-label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .style-options {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .style-options button {
      width: auto !important;
      padding: 6px 10px !important;
      font-size: 12px !important;
      font-weight: 600 !important;
      background: #1a3329 !important;
      color: var(--text) !important;
      border: 1px solid #3a6654 !important;
    }
    .style-options button[aria-pressed="true"] {
      background: linear-gradient(135deg, var(--gold), var(--gold2)) !important;
      color: #1a1205 !important;
      border-color: transparent !important;
    }
    .model-wrap {
      position: relative;
      flex: 1;
      min-height: 420px;
      width: 100%;
    }
    #live2dCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    #liveTalkingVideo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: none;
      z-index: 2;
      object-fit: contain;
      object-position: center bottom;
      background: #08120e;
    }
    #liveTalkingVideo.is-active { display: block; }
    #liveTalkingMjpeg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: none;
      z-index: 2;
      object-fit: contain;
      object-position: center bottom;
      background: #08120e;
    }
    #liveTalkingMjpeg.is-active { display: block; }
    #liveTalkingAudio { display: none; }
    #xmovMount {
      position: absolute;
      inset: 0;
      display: none;
      z-index: 1;
      overflow: hidden;
    }
    #xmovMount.is-active { display: block; }
    #xmovMount canvas, #xmovMount video {
      width: 100% !important;
      height: 100% !important;
      display: block !important;
      object-fit: contain !important;
      object-position: center bottom !important;
    }
    #live2dCanvas.is-hidden { display: none; }
    .model-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      background: rgba(8,18,14,.35);
      z-index: 2;
    }
    .model-loading.is-hidden { display: none; }
    .loader-ring {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(212,178,106,.25);
      border-top-color: var(--gold);
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    label { display:block; font-size:12px; color:var(--muted); margin: 0 0 6px; }
    select, textarea, input, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #10241d;
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
    }
    textarea { resize: vertical; min-height: 72px; }
    .btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
    button {
      border: none;
      cursor: pointer;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #1a1205;
    }
    button.secondary { background: #2f5646; color: var(--text); font-weight: 600; }
    button.danger { background: #8b3a3a; color: #fff; }
    button:disabled { opacity: .55; cursor: wait; }
    #log {
      white-space: pre-wrap;
      line-height: 1.55;
      min-height: 160px;
      max-height: 42vh;
      overflow: auto;
      font-size: 14px;
      background: rgba(0,0,0,.18);
      border-radius: 10px;
      padding: 12px;
    }
    .meta { font-size: 12px; color: var(--muted); margin-top: 8px; min-height: 18px; }
    .feature-actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px; }
    .file-action { display:block; text-align:center; padding:10px 12px; border-radius:10px; background:#2f5646; color:var(--text); cursor:pointer; font-weight:600; font-size:13px; }
    .location-panel {
      margin-top: 9px;
      padding: 11px;
      border: 1px solid rgba(212,178,106,.35);
      border-radius: 12px;
      background: rgba(7,18,14,.44);
    }
    .location-panel[hidden] { display: none; }
    .location-head { display:flex; justify-content:space-between; gap:10px; align-items:center; margin-bottom:8px; }
    .location-head strong { color:var(--gold); font-size:13px; }
    .location-head span { color:var(--muted); font-size:11px; text-align:right; }
    .location-state {
      padding: 8px 10px;
      border-radius: 9px;
      background: rgba(47,86,70,.35);
      color: var(--text);
      font-size: 12px;
      line-height: 1.45;
      margin-bottom: 9px;
    }
    .location-state.is-warning { background:rgba(154,122,53,.24); color:#f1d994; }
    .location-state.is-ok { background:rgba(45,113,78,.3); color:#bde6cc; }
    .location-methods { display:grid; gap:8px; }
    .location-method { display:grid; grid-template-columns:92px 1fr auto; gap:7px; align-items:center; }
    .location-method label { margin:0; }
    .location-method input, .location-method select { min-width:0; padding:8px 10px; font-size:12px; }
    .location-method button { width:auto; white-space:nowrap; padding:8px 11px; font-size:12px; }
    #useLocationCandidate { margin-top:8px; }
    .feedback { margin-top:12px; padding:11px; border:1px solid var(--line); border-radius:10px; background:rgba(0,0,0,.12); }
    .feedback-row { display:grid; grid-template-columns:110px 1fr auto; gap:8px; align-items:end; }
    .feedback-row button { width:auto; white-space:nowrap; padding:10px 15px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .hint { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.4; }
    .rec-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #e74c3c;
      margin-right: 6px;
      box-shadow: 0 0 0 0 rgba(231,76,60,.6);
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(231,76,60,.55); }
      70% { box-shadow: 0 0 0 10px rgba(231,76,60,0); }
      100% { box-shadow: 0 0 0 0 rgba(231,76,60,0); }
    }
    @media (max-width:560px) {
      .feedback-row { grid-template-columns:1fr; }
      .feedback-row button { width:100%; }
      .location-method { grid-template-columns:1fr; }
      .location-method button { width:100%; }
    }

    /* Visitor-facing redesign: an Eastern travel journal built around the guide. */
    :root {
      --paper: #f5f0e6;
      --paper-deep: #e7ddca;
      --ink: #20352f;
      --ink-soft: #5d6b62;
      --pine: #1f5a4f;
      --pine-deep: #143e36;
      --jade: #79a998;
      --cinnabar: #a33d2d;
      --amber: #bd873a;
      --line-soft: rgba(40, 67, 56, .18);
      --surface: rgba(255, 252, 245, .84);
      --surface-solid: #fffaf1;
      --shadow: 0 20px 50px rgba(56, 50, 35, .12);
    }
    * { box-sizing: border-box; }
    body {
      min-width: 320px;
      color: var(--ink);
      font-family: "Microsoft YaHei UI", "PingFang SC", sans-serif;
      background-color: var(--paper);
      background-image:
        repeating-linear-gradient(0deg, rgba(93, 70, 39, .025) 0 1px, transparent 1px 6px),
        linear-gradient(115deg, rgba(188, 135, 58, .08), transparent 31%),
        linear-gradient(290deg, rgba(31, 90, 79, .08), transparent 38%);
    }
    body::before {
      content: "";
      position: fixed;
      z-index: -1;
      width: min(54vw, 760px);
      height: min(54vw, 760px);
      top: -30vw;
      right: -13vw;
      border: 1px solid rgba(163, 61, 45, .13);
      border-radius: 50%;
      box-shadow: 0 0 0 72px rgba(163, 61, 45, .035), 0 0 0 144px rgba(163, 61, 45, .02);
      pointer-events: none;
    }
    header {
      width: min(1480px, calc(100% - 48px));
      margin: 0 auto;
      min-height: 100px;
      padding: 24px 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      border-bottom: 1px solid var(--line-soft);
    }
    header > div { position: relative; padding-left: 18px; }
    header > div::before {
      content: "";
      position: absolute;
      left: 0;
      top: 2px;
      bottom: 2px;
      width: 3px;
      background: var(--cinnabar);
    }
    header h1 {
      color: var(--ink);
      font-family: "STKaiti", "Kaiti SC", serif;
      font-size: 29px;
      font-weight: 700;
      letter-spacing: .12em;
      line-height: 1;
    }
    header p {
      margin-top: 9px;
      color: var(--ink-soft);
      font-size: 12px;
      letter-spacing: .05em;
    }
    main {
      width: min(1480px, calc(100% - 48px));
      max-width: none;
      margin: 0 auto;
      padding: 22px 0 32px;
      display: grid;
      grid-template-columns: minmax(0, 1.32fr) minmax(390px, .84fr);
      align-items: stretch;
      gap: 18px;
    }
    .stage {
      position: relative;
      isolation: isolate;
      min-height: 720px;
      padding: 0;
      overflow: hidden;
      border: 1px solid rgba(31, 90, 79, .29);
      border-radius: 5px;
      background:
        linear-gradient(180deg, rgba(255, 252, 244, .84) 0%, rgba(236, 227, 210, .76) 52%, rgba(209, 220, 204, .9) 100%);
      box-shadow: var(--shadow);
    }
    .stage::before,
    .stage::after {
      content: "";
      position: absolute;
      z-index: -1;
      pointer-events: none;
    }
    .stage::before {
      width: 106%;
      height: 47%;
      left: -3%;
      bottom: -12%;
      opacity: .63;
      background:
        radial-gradient(ellipse at 18% 100%, #76988a 0 21%, transparent 21.3%),
        radial-gradient(ellipse at 48% 98%, #54786a 0 28%, transparent 28.3%),
        radial-gradient(ellipse at 82% 99%, #6b917d 0 26%, transparent 26.3%),
        linear-gradient(0deg, #2f6959 0 38%, transparent 38%);
      clip-path: polygon(0 100%, 0 42%, 11% 27%, 23% 45%, 39% 16%, 53% 48%, 72% 20%, 85% 47%, 100% 24%, 100% 100%);
    }
    .stage::after {
      width: 170px;
      height: 170px;
      top: -86px;
      left: 42%;
      border: 1px solid rgba(189, 135, 58, .27);
      border-radius: 50%;
      box-shadow: 0 0 0 22px rgba(189, 135, 58, .055), 0 0 0 44px rgba(189, 135, 58, .035);
    }
    .stage-top {
      position: absolute;
      z-index: 6;
      top: 18px;
      right: 20px;
      left: 20px;
      padding: 0;
      align-items: flex-start;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 5px 9px;
      color: var(--pine-deep);
      border: 1px solid rgba(31, 90, 79, .32);
      border-radius: 0;
      background: rgba(255, 252, 245, .77);
      font-size: 12px;
      letter-spacing: .06em;
      backdrop-filter: blur(8px);
    }
    .style-trigger {
      min-height: 29px;
      width: auto !important;
      padding: 5px 10px !important;
      color: #fffaf1 !important;
      border: 1px solid var(--pine-deep) !important;
      border-radius: 0 !important;
      background: var(--pine-deep) !important;
      font-size: 12px !important;
      font-weight: 600 !important;
      letter-spacing: .08em;
    }
    .style-panel {
      width: 252px;
      top: calc(100% + 9px);
      padding: 14px;
      color: var(--ink);
      border: 1px solid rgba(31, 90, 79, .3);
      border-radius: 3px;
      background: rgba(255, 252, 245, .97);
      box-shadow: 0 16px 32px rgba(39, 53, 42, .16);
    }
    .style-label { color: var(--ink-soft); }
    .style-options button {
      color: var(--pine-deep) !important;
      border-color: rgba(31, 90, 79, .25) !important;
      border-radius: 2px !important;
      background: transparent !important;
    }
    .style-options button[aria-pressed="true"] {
      color: #fffaf1 !important;
      border-color: var(--pine-deep) !important;
      background: var(--pine-deep) !important;
    }
    .model-wrap {
      position: absolute;
      z-index: 2;
      inset: 0;
      min-height: auto;
      width: 100%;
    }
    #live2dCanvas, #liveTalkingVideo, #liveTalkingMjpeg, #xmovMount { filter: drop-shadow(0 24px 20px rgba(31, 54, 41, .16)); }
    #liveTalkingVideo { background: transparent; }
    .avatar-reaction {
      position: absolute;
      z-index: 6;
      left: 16px;
      bottom: 16px;
      padding: 6px 9px;
      border-radius: 999px;
      background: rgba(21, 52, 44, .78);
      color: #fffdf7;
      font-size: 12px;
      letter-spacing: .04em;
      box-shadow: 0 6px 16px rgba(14, 37, 31, .18);
    }
    .model-wrap[data-reaction="care"] .avatar-reaction,
    .model-wrap[data-reaction="comfort"] .avatar-reaction { background: rgba(105, 73, 67, .86); }
    .model-wrap[data-reaction="celebrate"] .avatar-reaction,
    .model-wrap[data-reaction="engage"] .avatar-reaction { background: rgba(159, 101, 34, .86); }
    .model-wrap[data-reaction="care"], .model-wrap[data-reaction="comfort"] { box-shadow: inset 0 0 0 2px rgba(173, 125, 106, .3); }
    .model-wrap[data-reaction="celebrate"], .model-wrap[data-reaction="engage"] { box-shadow: inset 0 0 0 2px rgba(190, 139, 56, .32); }
    .model-loading { color: var(--pine-deep); background: rgba(245, 240, 230, .5); }
    .loader-ring { border-color: rgba(31, 90, 79, .2); border-top-color: var(--cinnabar); }
    .stage-footer {
      position: absolute;
      z-index: 5;
      right: 20px;
      bottom: 18px;
      left: 20px;
      display: grid;
      grid-template-columns: minmax(170px, .9fr) minmax(0, 1.7fr);
      align-items: end;
      gap: 14px;
    }
    #avatarHint {
      margin: 0;
      padding: 9px 11px;
      color: var(--pine-deep);
      border-left: 3px solid var(--cinnabar);
      background: rgba(255, 252, 245, .72);
      font-size: 13px;
      line-height: 1.5;
      backdrop-filter: blur(6px);
    }
    .quick-prompts {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
    }
    .quick-prompt {
      width: auto;
      min-height: 30px;
      padding: 6px 9px;
      color: var(--pine-deep);
      border: 1px solid rgba(31, 90, 79, .35);
      border-radius: 0;
      background: rgba(255, 252, 245, .78);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .04em;
      transition: background .18s ease, color .18s ease;
      backdrop-filter: blur(6px);
    }
    .quick-prompt:hover { color: #fffaf1; background: var(--pine); }
    .control-panel {
      min-width: 0;
      padding: 24px;
      border: 1px solid var(--line-soft);
      border-radius: 5px;
      background: var(--surface);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .panel-heading { margin-bottom: 18px; }
    .panel-heading h2 { margin: 0; color: var(--ink); font-family: "STKaiti", "Kaiti SC", serif; font-size: 27px; letter-spacing: .08em; }
    .tool-tabs {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-bottom: 16px;
      border-bottom: 1px solid var(--line-soft);
    }
    .tool-tab {
      min-height: 38px;
      padding: 7px 4px;
      color: var(--ink-soft);
      border: 0;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      background: transparent;
      font-size: 14px;
      font-weight: 700;
      box-shadow: none !important;
      transform: none !important;
    }
    .tool-tab:hover { color: var(--pine-deep) !important; background: rgba(121, 169, 152, .1) !important; }
    .tool-tab[aria-pressed="true"] { color: var(--pine-deep); border-bottom-color: var(--cinnabar); background: transparent; }
    .tool-panel { min-height: 360px; }
    .tool-panel[hidden] { display: none; }
    .tool-description { margin: 0 0 14px; color: var(--ink-soft); font-family: "STKaiti", "Kaiti SC", serif; font-size: 16px; line-height: 1.65; }
    .tool-panel .question-box { margin-top: 0; }
    .btns.chat-actions { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .btns.chat-actions > button { width: 100%; }
    .route-action { width: 100%; margin-top: 12px; }
    .photo-action { display: flex; min-height: 112px; align-items: center; justify-content: center; border-style: dashed; }
    .row { grid-template-columns: 1fr; gap: 12px; }
    label { color: var(--ink-soft); font-size: 12px; font-weight: 700; letter-spacing: .08em; }
    select, textarea, input {
      color: var(--ink);
      border: 1px solid rgba(31, 90, 79, .24);
      border-radius: 2px;
      background: rgba(255, 252, 245, .78);
      box-shadow: none;
      font-size: 15px;
    }
    select:focus, textarea:focus, input:focus { outline: 2px solid rgba(121, 169, 152, .48); outline-offset: 1px; }
    textarea { min-height: 104px; padding: 13px 14px; line-height: 1.65; resize: vertical; }
    .question-box { margin-top: 18px; }
    .btns { grid-template-columns: 1.25fr 1fr 1fr; gap: 8px; margin-top: 10px; }
    button {
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: 2px;
      background: var(--pine);
      color: #fffaf1;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      transition: transform .16s ease, background .16s ease, box-shadow .16s ease;
    }
    button:not(:disabled):hover { background: var(--pine-deep); box-shadow: 0 5px 12px rgba(31, 90, 79, .18); transform: translateY(-1px); }
    button.secondary { color: var(--pine-deep); border-color: rgba(31, 90, 79, .3); background: transparent; }
    button.secondary:not(:disabled):hover { color: #fffaf1; border-color: var(--pine); background: var(--pine); }
    button.danger { background: var(--cinnabar); }
    .feature-actions { grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    .feature-actions #locate { grid-column: 1 / -1; }
    .file-action {
      min-height: 42px;
      padding: 11px 10px;
      color: var(--pine-deep);
      border: 1px solid rgba(31, 90, 79, .3);
      border-radius: 2px;
      background: transparent;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .03em;
      transition: background .16s ease, color .16s ease;
    }
    .file-action:hover { color: #fffaf1; background: var(--pine); }
    .advanced-settings { margin-top: 14px; border-top: 1px dashed var(--line-soft); }
    .advanced-settings summary { padding: 10px 0 2px; color: var(--ink-soft); cursor: pointer; font-size: 12px; font-weight: 700; letter-spacing: .06em; }
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
    .settings-grid > div { min-width: 0; }
    .location-panel {
      margin-top: 0;
      padding: 12px;
      border-color: rgba(31, 90, 79, .28);
      border-radius: 2px;
      background: rgba(225, 235, 223, .48);
    }
    .location-head strong { color: var(--pine-deep); }
    .location-head span, .location-state { color: var(--ink-soft); }
    .location-state { border-radius: 1px; background: rgba(121, 169, 152, .18); }
    .location-state.is-warning { color: #79550e; background: rgba(189, 135, 58, .15); }
    .location-state.is-ok { color: #15563b; background: rgba(91, 150, 113, .17); }
    .location-method { grid-template-columns: 84px 1fr auto; }
    .location-method button { min-height: 36px; padding: 7px 9px; }
    .meta {
      margin-top: 12px;
      padding: 9px 0 9px 10px;
      color: var(--ink-soft);
      border-left: 2px solid var(--amber);
      font-size: 13px;
      line-height: 1.5;
    }
    #secureHint { margin-top: 3px; color: #936318 !important; border-left-color: var(--cinnabar); }
    .reply-section { margin-top: 18px; padding-top: 17px; border-top: 1px solid var(--line-soft); }
    .reply-label { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .reply-label span { color: var(--ink-soft); font-size: 12px; letter-spacing: .08em; }
    #log {
      min-height: 180px;
      max-height: 33vh;
      padding: 14px 16px;
      color: var(--ink);
      border: 1px solid rgba(31, 90, 79, .18);
      border-radius: 2px;
      background: rgba(255, 252, 245, .57);
      font-family: "STKaiti", "Kaiti SC", serif;
      font-size: 16px;
      line-height: 1.8;
    }
    #log:empty::before { content: "灵曦已在此等候。可以问景点故事、路线与游览建议。"; color: rgba(93, 107, 98, .67); }
    .feedback {
      margin-top: 16px;
      padding: 15px 0 0;
      border: 0;
      border-top: 1px dashed var(--line-soft);
      border-radius: 0;
      background: transparent;
    }
    .feedback summary { color: var(--ink-soft); cursor: pointer; font-size: 12px; font-weight: 700; letter-spacing: .08em; }
    .feedback-row { margin-top: 11px; }
    .feedback-row { grid-template-columns:minmax(115px,1fr) minmax(145px,1.2fr) 112px; }
    #feedbackComment { grid-column:1 / 3; }
    #sendFeedback { grid-column:3; }
    .feedback-row button { min-height: 40px; border-radius: 2px; }
    .emotion-consent { grid-column:1/-1; display:flex; gap:8px; align-items:center; color:var(--ink-soft); font-size:12px; }
    .emotion-consent input { width:auto; flex:0 0 auto; }
    .hint { color: var(--ink-soft); font-size: 12px; line-height: 1.65; }
    .rec-dot { background: var(--cinnabar); }
    .vision-result {
      margin-top: 12px;
      padding: 11px;
      border: 1px solid var(--line-soft);
      background: rgba(250, 247, 239, .68);
      font-size: 12px;
      color: var(--ink-soft);
    }
    .vision-result strong { color: var(--pine-deep); }
    .vision-candidates { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 9px; }
    .vision-candidate {
      padding: 7px 9px;
      border: 1px solid rgba(38, 88, 75, .3);
      background: #fffdf7;
      color: var(--pine-deep);
      font-size: 12px;
      cursor: pointer;
    }
    .vision-candidate:hover { border-color: var(--pine); background: #f1f5ee; }
    .qr-scanner {
      grid-column: 1 / -1;
      margin-top: 4px;
      padding: 9px;
      border: 1px dashed rgba(38, 88, 75, .45);
      background: rgba(255,255,255,.48);
    }
    .qr-scanner video { display: block; width: min(100%, 300px); max-height: 190px; margin: 8px auto; background: #111; object-fit: cover; }
    .qr-scanner-head { display:flex; justify-content:space-between; gap:8px; align-items:center; font-size:12px; color:var(--ink-soft); }
    @media (max-width: 1100px) {
      main { grid-template-columns: minmax(0, 1.08fr) minmax(340px, .92fr); }
    }
    @media (max-width: 900px) {
      header, main { width: min(100% - 28px, 680px); }
      header { min-height: 84px; padding: 18px 0 15px; }
      main { grid-template-columns: 1fr; padding-top: 14px; }
      .stage { min-height: 670px; }
      .control-panel { padding: 20px; }
    }
    @media (max-width: 600px) {
      body::before { width: 310px; height: 310px; top: -150px; right: -160px; }
      header { align-items: flex-start; gap: 12px; }
      header h1 { font-size: 23px; line-height: 1.15; }
      header p { max-width: 205px; line-height: 1.5; }
      .stage { min-height: 600px; }
      .stage-footer { grid-template-columns: 1fr; gap: 8px; }
      .quick-prompts { justify-content: flex-start; }
      .quick-prompt { padding: 5px 7px; }
      .panel-heading h2 { font-size: 24px; }
      .btns { grid-template-columns: 1fr 1fr; }
      .feature-actions { grid-template-columns: 1fr; }
      .feature-actions #locate { grid-column: auto; }
      .btns #ask { grid-column: 1 / -1; }
      .location-method { grid-template-columns: 1fr; }
      .location-method button { width: 100%; }
      .feedback-row { grid-template-columns: 1fr; }
      #feedbackComment,#sendFeedback { grid-column:auto; }
      .settings-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>灵山小向导 · 灵曦</h1>
    </div>
  </header>
  <main>
    <section class="card stage">
      <div class="stage-top">
        <div class="badge" id="avatarBadge">灵曦 · 正在准备</div>
        <div class="stage-actions">
          <label class="avatar-picker" for="avatarSelect">人物
            <select id="avatarSelect" disabled aria-label="选择数字人人物"></select>
          </label>
          <div class="style-control" id="styleControl">
            <button class="style-trigger" id="styleButton" type="button" aria-expanded="false" disabled>造型</button>
            <div class="style-panel" id="stylePanel" hidden>
            <div class="style-group">
              <span class="style-label">神态</span>
              <div class="style-options" id="expressionOptions">
                <button type="button" data-expression="natural" aria-pressed="true">自然</button>
                <button type="button" data-expression="gentle" aria-pressed="false">温柔</button>
                <button type="button" data-expression="smile" aria-pressed="false">笑意</button>
                <button type="button" data-expression="bright" aria-pressed="false">灵动</button>
              </div>
            </div>
            <div class="style-group">
              <span class="style-label">发色</span>
              <div class="style-options" id="hairOptions">
                <button type="button" data-hair="classic" aria-pressed="true">雾紫</button>
                <button type="button" data-hair="chestnut" aria-pressed="false">茶棕</button>
                <button type="button" data-hair="ink" aria-pressed="false">墨青</button>
              </div>
            </div>
            <div class="style-group">
              <span class="style-label">服装</span>
              <div class="style-options" id="costumeOptions">
                <button type="button" data-costume="classic" aria-pressed="true">云墨灰</button>
                <button type="button" data-costume="jade" aria-pressed="false">灵山青</button>
                <button type="button" data-costume="cinnabar" aria-pressed="false">朱砂红</button>
              </div>
            </div>
            </div>
          </div>
        </div>
      </div>
      <div class="model-wrap" id="modelWrap">
        <video id="liveTalkingVideo" autoplay playsinline muted aria-label="灵曦数字人"></video>
        <img id="liveTalkingMjpeg" alt="灵曦 HTTP 数字人" />
        <audio id="liveTalkingAudio" autoplay></audio>
        <div id="xmovMount" aria-label="灵曦数字人"></div>
        <canvas id="live2dCanvas" aria-label="灵曦数字人"></canvas>
        <div id="avatarReaction" class="avatar-reaction" aria-live="polite">灵曦 · 自然讲解</div>
        <div class="model-loading" id="modelLoading">
          <span class="loader-ring"></span>
          <span>灵曦正在准备…</span>
        </div>
      </div>
      <div class="stage-footer">
        <div class="hint" id="avatarHint">数字人初始化中</div>
        <div class="quick-prompts" aria-label="快捷提问">
          <button class="quick-prompt" type="button" data-prompt="灵山大佛有什么特别之处？">大佛故事</button>
          <button class="quick-prompt" type="button" data-prompt="我只有两小时，推荐一条灵山游览路线。">两小时路线</button>
          <button class="quick-prompt" type="button" data-prompt="带孩子游灵山，有哪些轻松有趣的安排？">亲子游建议</button>
        </div>
      </div>
    </section>

    <section class="card control-panel">
      <div class="panel-heading">
        <h2>和灵曦聊聊</h2>
      </div>
      <div class="tool-tabs" role="toolbar" aria-label="导览功能">
        <button class="tool-tab" type="button" data-tool-tab="chat" aria-pressed="true">问答</button>
        <button class="tool-tab" type="button" data-tool-tab="route" aria-pressed="false">路线</button>
        <button class="tool-tab" type="button" data-tool-tab="photo" aria-pressed="false">识景</button>
        <button class="tool-tab" type="button" data-tool-tab="location" aria-pressed="false">定位</button>
      </div>

      <div class="tool-panel" data-tool-panel="chat">
        <div class="question-box">
          <label>想问灵曦什么</label>
          <textarea id="q" rows="3">灵山大佛有多高？用了多少铜？</textarea>
        </div>
        <div class="btns chat-actions">
          <button id="ask">开始问答</button>
          <button id="voice" class="secondary">点击说话</button>
        </div>
      </div>

      <div class="tool-panel" data-tool-panel="route" hidden>
        <p class="tool-description">选一个游览偏好，灵曦会为你安排顺路、松弛的游览建议。</p>
        <div class="row">
          <div>
            <label>想看什么</label>
            <select id="interest">
              <option value="历史">历史文化</option>
              <option value="自然">自然风光</option>
              <option value="亲子">亲子家庭</option>
            </select>
          </div>
        </div>
        <button id="rec" class="route-action" type="button">为我推荐路线</button>
      </div>

      <div class="tool-panel" data-tool-panel="photo" hidden>
        <p class="tool-description">拍下眼前的建筑、雕塑或景色，灵曦会接着为你讲解。</p>
        <label class="file-action photo-action">拍照识景
          <input id="photoFile" type="file" accept="image/*" capture="environment" style="display:none" />
        </label>
        <div id="visionResult" class="vision-result" hidden></div>
      </div>

      <div class="tool-panel" data-tool-panel="location" hidden>
        <p class="tool-description">可使用当前位置、摄像头扫码、景点码或手动选择，开始附近景点讲解。</p>
        <button id="locate" class="route-action secondary" type="button">使用当前位置</button>
        <div class="location-panel" id="locationPanel">
          <div class="location-head">
            <strong>位置选择</strong>
            <span>当前位置 / 景点码 / 手动</span>
          </div>
          <div class="location-state" id="locationState" role="status" aria-live="polite">等待定位</div>
          <div class="location-methods">
            <div class="location-method">
              <label for="locationCode">景点点位码</label>
              <input id="locationCode" placeholder="例如 LS-006" autocomplete="off" />
              <button id="scanQr" class="secondary" type="button">摄像头扫码</button>
              <button id="locateQr" class="secondary" type="button">确认</button>
            </div>
            <div class="location-method">
              <label for="wifiNode">景区 Wi-Fi</label>
              <select id="wifiNode">
                <option value="LS-WIFI-SOUTH">南门入口节点</option>
                <option value="LS-WIFI-NINE">九龙灌浴节点</option>
                <option value="LS-WIFI-BUDDHA">大佛区域节点</option>
                <option value="LS-WIFI-BRAHMA">梵宫区域节点</option>
              </select>
              <button id="locateWifi" class="secondary" type="button">确认</button>
            </div>
            <div class="location-method">
              <label for="manualSpot">手动选择</label>
              <select id="manualSpot">
                <option>灵山大照壁</option>
                <option>九龙灌浴</option>
                <option>灵山大佛</option>
                <option>灵山梵宫</option>
                <option>五印坛城</option>
              </select>
              <button id="locateManual" class="secondary" type="button">确认</button>
            </div>
            <div id="qrScanner" class="qr-scanner" hidden>
              <div class="qr-scanner-head"><span>将景点二维码置于取景框内</span><button id="stopQrScan" class="secondary" type="button">取消扫码</button></div>
              <video id="qrVideo" autoplay playsinline muted></video>
            </div>
          </div>
          <button id="useLocationCandidate" type="button" hidden>确认候选点并开始讲解</button>
        </div>
      </div>
      <div class="meta" id="status">正在准备</div>
      <div class="meta" id="secureHint" style="color:#e0c07a;"></div>
      <div class="reply-section">
        <div class="reply-label">
          <label>导览回复</label>
          <span>基于景区知识库</span>
        </div>
        <div id="log"></div>
      </div>
      <details class="advanced-settings">
        <summary>更多设置</summary>
        <div class="settings-grid">
          <div>
            <label>问答模型</label>
            <select id="modelRoute">
              <option value="cloud">默认模式</option>
              <option value="local">本地模式</option>
            </select>
          </div>
          <div>
            <label>服务地址</label>
            <input id="base" value="" placeholder="默认当前站点" />
          </div>
          <div>
            <label>数字人呈现</label>
            <select id="avatarMode">
              <option value="realtime">拟真口型模式</option>
              <option value="expressive">情感表情模式（Live2D）</option>
            </select>
          </div>
          <label class="emotion-consent"><input id="emotionConsent" type="checkbox" /> 允许本次语音使用原声与 ASR 文本分析情绪；原音频默认在分析后删除</label>
        </div>
      </details>
      <details class="feedback">
        <summary>本次体验反馈</summary>
        <div class="feedback-row">
          <select id="feedbackArea" aria-label="景区"><option value="">加载景区…</option></select>
          <select id="feedbackAttraction" aria-label="景点"><option value="">请选择景点</option></select>
          <select id="rating" aria-label="满意度"><option value="5">5分 · 非常满意</option><option value="4">4分 · 满意</option><option value="3">3分 · 一般</option><option value="2">2分 · 不满意</option><option value="1">1分 · 很不满意</option></select>
          <input id="feedbackComment" maxlength="1000" placeholder="可填写建议或感受" />
          <button id="sendFeedback" class="secondary" type="button">提交反馈</button>
        </div>
      </details>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const base = () => ($("base").value.trim() || location.origin);
    let sessionId = null;
    let currentAudio = null;
    let currentAudioCtx = null;
    let currentObjectUrl = null;
    let currentTtsController = null;
    let currentSpeechPipeline = null;
    let talking = false;
    let speechToken = 0;
    const xmovState = {
      avatar: null,
      ready: false,
      configured: false,
      connecting: false,
      interactionStartedAt: 0,
    };
    const liveTalkingState = {
      pc: null,
      sessionId: null,
      ready: false,
      connecting: false,
      avatarId: null,
      transport: null,
    };
    const avatarLabels = {
      lingshan_guide_v1: "女导游 · 山寺",
      lingshan_guide_v2: "女导游 · 青绿",
      lingshan_guide_v3: "男导游 · 青绿",
      lingshan_guide_v4: "男向导 · 户外",
      wav2lip256_zen_avatar1: "灰袍灵曦",
      wav2lip256_avatar1: "经典人物",
    };
    let liveTalkingStartPromise = null;
    const preferHttpTransport = () =>
      new URLSearchParams(location.search).get("transport") !== "webrtc";
    const DEFAULT_AVATAR_REACTION = {
      id: "calm", label: "自然讲解", expression: "natural", voice_speed: 1.0,
      tone: "自然、清晰", prefix: "",
    };
    let currentAvatarReaction = { ...DEFAULT_AVATAR_REACTION };
    let avatarMode = localStorage.getItem("lingshan-avatar-mode") || "realtime";
    if (avatarMode !== "expressive") avatarMode = "realtime";
    $("avatarMode").value = avatarMode;
    let liveTalkingServiceStartPromise = null;

    const savedModelRoute = localStorage.getItem("lingshan-model-route");
    if (savedModelRoute === "cloud" || savedModelRoute === "local") {
      $("modelRoute").value = savedModelRoute;
    }
    $("modelRoute").addEventListener("change", () => {
      localStorage.setItem("lingshan-model-route", $("modelRoute").value);
      sessionId = null;
      $("status").textContent = $("modelRoute").value === "local"
        ? "已切换本地模型；首次加载权重会较慢，空闲后自动释放显存"
        : "已切换 GLM API；不会占用本机大模型显存";
    });

    async function refreshModelRoutes() {
      try {
        const response = await fetch(base() + "/v1/model-routes", { cache: "no-store" });
        if (!response.ok) return;
        const data = await response.json();
        const localRoute = data.routes && data.routes.local;
        const localOption = $("modelRoute").querySelector('option[value="local"]');
        if (localRoute && localOption) {
          const available = localRoute.available !== false;
          localOption.disabled = !available;
          localOption.textContent = !available
            ? "本地模型（本机未安装）"
            : (localRoute.ready ? "本地 Qwen2-7B（服务就绪）" : "本地 Qwen2-7B（按需启动）");
          if (!available && $("modelRoute").value === "local") {
            $("modelRoute").value = "cloud";
            localStorage.setItem("lingshan-model-route", "cloud");
            sessionId = null;
            $("status").textContent = "本地模型未安装，已切换 GLM API";
          }
        }
      } catch (_) {}
    }

    function setPressed(buttons, activeValue, dataName) {
      buttons.forEach((btn) => {
        btn.setAttribute("aria-pressed", String(btn.dataset[dataName] === activeValue));
      });
    }

    /** 立刻打断当前 TTS / 口型（换造型、重新提问时调用） */
    function stopSpeech(reason) {
      speechToken += 1;
      talking = false;
      if (currentSpeechPipeline) {
        currentSpeechPipeline.cancel();
        currentSpeechPipeline = null;
      }
      if (currentTtsController) {
        currentTtsController.abort();
        currentTtsController = null;
      }
      if (currentAudio) {
        try {
          currentAudio.onplay = null;
          currentAudio.onended = null;
          currentAudio.onerror = null;
          currentAudio.pause();
          currentAudio.removeAttribute("src");
          currentAudio.load();
        } catch (_) {}
        currentAudio = null;
      }
      if (currentAudioCtx) {
        try { currentAudioCtx.close(); } catch (_) {}
        currentAudioCtx = null;
      }
      if (currentObjectUrl) {
        try { URL.revokeObjectURL(currentObjectUrl); } catch (_) {}
        currentObjectUrl = null;
      }
      if (window.LingxiLive2D) {
        LingxiLive2D.stopSpeaking();
        LingxiLive2D.setMouthFromAudio(0);
      }
      if (reason) $("status").textContent = reason;
    }

    // ---------- Live2D init ----------
    let live2DReady = false;
    let live2DBootPromise = null;
    let live2DScriptsPromise = null;

    function loadLive2DScripts() {
      if (window.LingxiLive2D) return Promise.resolve();
      if (live2DScriptsPromise) return live2DScriptsPromise;
      const sources = [
        "/static/vendor/live2dcubismcore.min.js",
        "/static/vendor/pixi.min.js",
        "/static/vendor/cubism4.min.js",
        "/static/js/lingxi-live2d.js",
      ];
      live2DScriptsPromise = sources.reduce(
        (previous, source) => previous.then(() => new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = source;
          script.onload = resolve;
          script.onerror = () => reject(new Error("Live2D 脚本加载失败：" + source));
          document.head.appendChild(script);
        })),
        Promise.resolve(),
      ).catch(error => {
        live2DScriptsPromise = null;
        throw error;
      });
      return live2DScriptsPromise;
    }

    function bootLive2D() {
      if (live2DReady) return Promise.resolve(true);
      if (live2DBootPromise) return live2DBootPromise;
      live2DBootPromise = (async () => {
        try {
          await loadLive2DScripts();
          await LingxiLive2D.init($("live2dCanvas"), $("modelWrap"));
          live2DReady = true;
          $("modelLoading").classList.add("is-hidden");
          $("styleButton").disabled = false;
          $("avatarHint").textContent = "灵曦已就绪";
          $("status").textContent = "已准备好";
          return true;
        } catch (err) {
          console.error(err);
          $("modelLoading").innerHTML = "<strong>Live2D 载入失败</strong><span>" + String(err.message || err) + "</span>";
          $("avatarHint").textContent = "Live2D 失败，文字/语音问答仍可用";
          return false;
        }
      })().finally(() => {
        live2DBootPromise = null;
      });
      return live2DBootPromise;

    function renderAvatarOptions(avatarIds, selectedId) {

    async function waitForIceGathering(pc, timeoutMs = 3500) {
      if (pc.iceGatheringState === "complete") return;
      await new Promise(resolve => {
        let timer = null;
        const done = () => {
          pc.removeEventListener("icegatheringstatechange", check);
          if (timer) clearTimeout(timer);
          resolve();
        };
        const check = () => {
          if (pc.iceGatheringState === "complete") done();
        };
        pc.addEventListener("icegatheringstatechange", check);
        timer = setTimeout(done, timeoutMs);
      });
    }

    async function bootLiveTalking() {
      if (avatarMode === "expressive") {
        fallbackToLive2D("情感表情模式已启用");
        await bootLive2D();
        return false;
      }
      if (liveTalkingState.ready || liveTalkingState.connecting) return liveTalkingState.ready;
      liveTalkingState.connecting = true;
      try {
        const statusResponse = await fetch(base() + "/v1/livetalking/status", {
          cache: "no-store",
          priority: "high",
        });
        if (!statusResponse.ok) throw new Error("LiveTalking 状态读取失败");
        const status = await statusResponse.json();
        const availableAvatars = Array.isArray(status.available_avatars)
          ? status.available_avatars
          : [status.avatar_id].filter(Boolean);
        const savedAvatarId = localStorage.getItem("lingshan-avatar-id");
        liveTalkingState.avatarId = availableAvatars.includes(savedAvatarId)
          ? savedAvatarId
          : (status.avatar_id || availableAvatars[0] || null);
        renderAvatarOptions(availableAvatars, liveTalkingState.avatarId);
        if (!status.enabled || !status.ready) {
          fallbackToLive2D("灵曦正在准备，您可以先开始提问");
          await bootLive2D();
          return false;
        }

        if (preferHttpTransport()) {
          return await bootLiveTalkingHttp();
        }

        document.getElementById("avatarHint").textContent = "正在连接灵曦…";
        liveTalkingState.transport = "webrtc";
        const iceServers = Array.isArray(status.ice_servers)
          ? status.ice_servers
          : (status.turn ? [status.turn] : []);
        const hasTurnRelay = iceServers.some(server => {
          const urls = Array.isArray(server.urls) ? server.urls : [server.urls];
          return urls.some(url => typeof url === "string" && /^(turn|turns):/i.test(url));
        });
        const pc = new RTCPeerConnection({
          sdpSemantics: "unified-plan",
          iceServers,
          iceTransportPolicy: hasTurnRelay ? "relay" : "all",
        });
        liveTalkingState.pc = pc;
        let resolveConnected;
        let rejectConnected;
        const connected = new Promise((resolve, reject) => {
          resolveConnected = resolve;
          rejectConnected = reject;
        });

        pc.addEventListener("track", event => {
          const stream = new MediaStream([event.track]);
          if (event.track.kind === "video") {
            const video = document.getElementById("liveTalkingVideo");
            video.srcObject = stream;
            video.play().catch(() => {});
          } else {
            const audio = document.getElementById("liveTalkingAudio");
            audio.srcObject = stream;
            audio.play().catch(() => {});
          }
        });
        pc.addEventListener("connectionstatechange", () => {
          const state = pc.connectionState;
          if (state === "connected") {
            liveTalkingState.ready = true;
            activateLiveTalkingView();
            if (!document.getElementById("ask").disabled) {
              document.getElementById("status").textContent = (avatarLabels[liveTalkingState.avatarId] || "数字人") + "已准备好";
            }
            resolveConnected(true);
          } else if (state === "failed") {
            rejectConnected(new Error("LiveTalking WebRTC 连接失败"));
          } else if (state === "disconnected" || state === "closed") {
            liveTalkingState.ready = false;
            fallbackToLive2D("连接暂时中断，已切换到轻量模式");
          }
        });

        pc.addTransceiver("video", { direction: "recvonly" });
        pc.addTransceiver("audio", { direction: "recvonly" });
        await pc.setLocalDescription(await pc.createOffer());
        await waitForIceGathering(pc);
        const offerResponse = await fetch(base() + "/v1/livetalking/offer", {
          method: "POST",
          priority: "high",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            sdp: pc.localDescription.sdp,
            type: pc.localDescription.type,
            avatar: liveTalkingState.avatarId,
          }),
        });
        if (!offerResponse.ok) throw new Error(await offerResponse.text());
        const answer = await offerResponse.json();
        if (!answer.sdp || !answer.sessionid) throw new Error(answer.msg || "LiveTalking 未返回会话");
        liveTalkingState.sessionId = String(answer.sessionid);
        await pc.setRemoteDescription(new RTCSessionDescription({ type: answer.type, sdp: answer.sdp }));
        await Promise.race([
          connected,
          new Promise((_, reject) => setTimeout(() => reject(new Error("LiveTalking 连接超时")), 12000)),
        ]);
        window.addEventListener("beforeunload", () => {
          const closingSessionId = liveTalkingState.sessionId;
          if (closingSessionId) {
            fetch(base() + "/v1/livetalking/close", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                session_id: closingSessionId,
                transport: liveTalkingState.transport,
              }),
              keepalive: true,
            }).catch(() => {});
          }
          try { pc.close(); } catch (_) {}
        }, { once: true });
        return true;
      } catch (error) {
        console.error(error);
        liveTalkingState.ready = false;
        const failedSessionId = liveTalkingState.sessionId;
        liveTalkingState.sessionId = null;
        if (liveTalkingState.pc) {
          try { liveTalkingState.pc.close(); } catch (_) {}
        }
        liveTalkingState.pc = null;
        if (failedSessionId) {
          fetch(base() + "/v1/livetalking/close", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              session_id: failedSessionId,
              transport: liveTalkingState.transport,
            }),
          }).catch(() => {});
        }
        fallbackToLive2D("灵曦暂时无法连接，已切换到轻量模式");
        await bootLive2D();
        return false;
      } finally {
        liveTalkingState.connecting = false;
      }
    }

    function stripMeta(text) {
      let emotionVal = null;
      // Metadata arrives token-by-token. Stop exposing text as soon as a JSON
      // object begins on a new line; waiting for the closing brace would let
      // the sentence TTS pipeline speak partial keys such as "emotion".
      const metaMatch = text.match(/(?:^|\n)\s*\{/);
      let visible = text;
      if (metaMatch && metaMatch.index !== undefined) {
        const braceOffset = metaMatch[0].lastIndexOf("{");
        const metaStart = metaMatch.index + braceOffset;
        const rawMeta = text.slice(metaStart).trim();
        visible = text.slice(0, metaMatch.index).trimEnd();
        if (rawMeta.endsWith("}")) {
          try {
            const parsed = JSON.parse(rawMeta);
            if (parsed.emotion) emotionVal = parsed.emotion;
          } catch (_) {}
        }
      }
      return { text: visible.trim(), emotion: emotionVal };
    }

    function decodePcm16Base64(encoded) {
      const binary = atob(encoded);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
      const samples = new Float32Array(Math.floor(bytes.byteLength / 2));
      for (let i = 0; i < samples.length; i++) {
        samples[i] = view.getInt16(i * 2, true) / 32768;
      }
      return samples;
    }

    function normalizeSpeechText(text) {
      return String(text || "")
        .replace(/\s*(?:→|⇒|⟶|➜|➡|--?>)\s*/g, "，接着前往")
        .replace(/^\s*[，、]\s*/, "")
        .trim();
    }

    function createPcmSpeechPipeline(interactionStartedAt = performance.now(), options = {}) {
      const myToken = speechToken;
      const voiceSpeed = Math.max(0.8, Math.min(1.2, Number(options.reaction?.voice_speed) || 1.0));
      const queue = [];
      let finished = false;
      let cancelled = false;
      let wakeResolver = null;
      let ctxA = null;
      let analyser = null;
      let nextStartAt = 0;
      let started = false;
      let pipeline = null;

      function notify() {

              if (ev.avatar_reaction) {
                activeReaction = ev.avatar_reaction;
                applyAvatarReaction(activeReaction);
              }
              $("status").textContent = "引用: " + (ev.citations || []).map(c => c.title).slice(0,3).join(" / ");
            } else if (ev.type === "delta") {
              full += ev.content;
              const parsed = stripMeta(full);
              $("log").textContent = parsed.text;
              enqueueReadySpeech(parsed.text);
              if (parsed.emotion) setEmotion(parsed.emotion);
            } else if (ev.type === "done") {
              $("status").textContent += " · 模型 " + ev.latency_ms + "ms";
            } else if (ev.type === "error") {
              throw new Error(ev.message || "RAG 问答失败");
            }
          }
        }

        const parsed = stripMeta(full);
        $("log").textContent = parsed.text;
        enqueueReadySpeech(parsed.text, true);
        if (pipeline) pipeline.finish();
        if (parsed.emotion) setEmotion(parsed.emotion);
      } catch (e) {
        stopSpeech();
        $("log").textContent = String(e);
        $("status").textContent = "失败";
      } finally {
        btn.disabled = false;
      }
    }

    function recordingFilename(blob) {
      const type = String(blob?.type || "").toLowerCase();
      if (type.includes("mp4") || type.includes("m4a")) return "speech.m4a";

    async function recognizeBlob(blob, filename, interactionStartedAt = performance.now()) {
      $("status").innerHTML = '<span class="rec-dot"></span>处理音频…';
      if (!blob || blob.size < 512) throw new Error("未采集到有效录音，请重新说一次");
      $("status").innerHTML = '<span class="rec-dot"></span>识别中…';
      const fd = new FormData();
      // Let the server's ffmpeg normalizer handle the original MediaRecorder
      // container. This avoids browser-specific decodeAudioData failures.
      fd.append("file", blob, filename || recordingFilename(blob));
      if (sessionId) fd.append("session_id", sessionId);
      fd.append("emotion_consent", String($("emotionConsent").checked));
      const r = await fetch(base() + "/v1/asr", { method: "POST", body: fd });
      if (!r.ok) {
        let msg = await r.text();
        try { msg = JSON.parse(msg).detail || msg; } catch (_) {}
        if (String(msg).includes("no audio segment")) {
          throw new Error("未检测到有效语音。请说完 1～2 秒后再结束。");
        }
        throw new Error("识别失败: " + msg);
      }
      const data = await r.json();
      sessionId = data.session_id || sessionId;
      const text = (data.text || "").trim();
      if (!text) throw new Error("未识别到内容");
      $("q").value = text;
      $("status").textContent = "识别：" + text;
      await askText(text, interactionStartedAt, "voice", data.emotion_event_id || null);
    }

    let mediaRecorder = null;
    let recStream = null;
    let audioChunks = [];
    let recording = false;
    let recStartedAt = 0;
    let recStoppedAt = 0;

    async function startRec() {
      if (!canMic) {
        $("status").textContent = "HTTP 下请用 HTTPS:8443 或上传 wav/mp3";
        return;
      }
      if (recording) return;
      stopSpeech();
      recStream = await navigator.mediaDevices.getUserMedia({
        audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true }
      });
      audioChunks = [];
      const mime = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
        ? "audio/webm;codecs=opus"
        : (MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "");
      mediaRecorder = mime ? new MediaRecorder(recStream, { mimeType: mime }) : new MediaRecorder(recStream);
      mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size) audioChunks.push(e.data); };
      mediaRecorder.onstop = async () => {
        try {
          recStream.getTracks().forEach(t => t.stop());
          if ((Date.now() - recStartedAt) / 1000 < 0.8) {
            $("status").textContent = "录音太短，请至少说 1～2 秒";
            return;
          }
          const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || "audio/webm" });
          await recognizeBlob(blob, recordingFilename(blob), recStoppedAt || performance.now());
        } catch (err) {
          $("status").textContent = String(err.message || err);
        }
      };
      mediaRecorder.start(200);
      recording = true;
      recStartedAt = Date.now();
      $("voice").classList.add("danger");
      $("voice").textContent = "点击结束";
      $("status").innerHTML = '<span class="rec-dot"></span>录音中…说完再点结束';
    }

    function stopRec() {
      if (!recording) return;

      $("voice").classList.remove("danger");
      $("voice").textContent = canMic ? "点击说话" : "麦克风不可用";
      recStoppedAt = performance.now();
      if (mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop();
    }

    let qrStream = null;
    let qrFrame = 0;
    let qrScanActive = false;

    function stopQrScanner() {
      qrScanActive = false;
      if (qrFrame) cancelAnimationFrame(qrFrame);
      qrFrame = 0;
      if (qrStream) qrStream.getTracks().forEach(track => track.stop());
      qrStream = null;
      const video = $("qrVideo");
      video.srcObject = null;
      $("qrScanner").hidden = true;
    }

    function pointCodeFromQr(rawValue) {
      const raw = String(rawValue || "").trim();
      try {
        const url = new URL(raw);
        const fromUrl = url.searchParams.get("spot") || url.searchParams.get("code");
        if (fromUrl) return fromUrl.trim().toUpperCase();
      } catch (_) {}
      const match = raw.match(/(?:LS|NH)-(?:\d{3}|FO|FG|WY)/i);
      return (match ? match[0] : raw).trim().toUpperCase();
    }

    async function startQrScanner() {
      if (!window.isSecureContext || !navigator.mediaDevices?.getUserMedia) {
        showLocationState("摄像头扫码需要 HTTPS 与摄像头权限；请改为输入景点码。", "warning");
        return;
      }
      if (!("BarcodeDetector" in window)) {
        showLocationState("当前浏览器不支持原生二维码识别；请使用最新版 Chrome，或输入景点码。", "warning");
        return;
      }
      stopQrScanner();
      try {
        const detector = new BarcodeDetector({ formats: ["qr_code"] });
        qrStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: "environment" } }, audio: false });
        const video = $("qrVideo");
        video.srcObject = qrStream;
        $("qrScanner").hidden = false;
        await video.play();
        qrScanActive = true;
        showLocationState("正在扫描景点二维码…", "warning");
        const scan = async () => {
          if (!qrScanActive) return;
          try {
            const codes = await detector.detect(video);
            const raw = codes[0]?.rawValue;
            if (raw) {
              const code = pointCodeFromQr(raw);
              stopQrScanner();
              $("locationCode").value = code;
              await handleLocationResult(await requestLocation({ mode: "qr", code }));
              return;
            }
          } catch (error) {
            console.debug("QR frame skipped", error);
          }
          qrFrame = requestAnimationFrame(scan);
        };
        qrFrame = requestAnimationFrame(scan);
      } catch (error) {
        stopQrScanner();
        showLocationState("无法打开摄像头：" + String(error.message || error), "warning");
      }
    }

    async function handleLocationResult(data) {
      locationCandidate = data.spot_name ? data : null;
      $("useLocationCandidate").hidden = true;
      if (data.resolved && !data.requires_confirmation) {
        const detail = data.accuracy_m ? `，精度约 ${data.accuracy_m} 米` : "";
        showLocationState(`已定位：${data.spot_name}${detail}。${data.note || ""}`, "ok");
        await startLocatedGuide(data);
        return;
      }
      if (data.spot_name) {
        const distance = Number.isFinite(data.distance_m) ? `，距候选点约 ${data.distance_m} 米` : "";
        showLocationState(`候选位置：${data.spot_name}${distance}。${data.note || "请确认位置。"}`);
        $("useLocationCandidate").textContent = `确认我在${data.spot_name}附近并开始讲解`;
        $("useLocationCandidate").hidden = false;
        const option = Array.from($("manualSpot").options).find(item => item.value === data.spot_name);
        if (option) $("manualSpot").value = option.value;
        return;
      }
      showLocationState(data.note || "自动定位失败，请使用二维码、Wi-Fi 或手动选择。", "warning");
    }

    function gpsErrorMessage(error) {
      if (error && error.code === 1) return "未获得定位权限。请扫描景点二维码，或手动选择位置。";
      if (error && error.code === 2) return "GPS 信号不可用，可能位于室内或建筑遮挡区。请改用二维码或景区 Wi-Fi。";
      if (error && error.code === 3) return "GPS 定位超过 5 秒仍未完成，已停止等待。请使用下方降级方式。";
      return "无法取得 GPS 位置，请使用二维码、景区 Wi-Fi 或手动选择。";
    }

      }
    }
    document.addEventListener("pointerdown", warmRagOnActivity, { passive: true });
    document.addEventListener("keydown", warmRagOnActivity, { passive: true });
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") void warmRagOnActivity();
    });
    void warmRagOnActivity();

    void refreshModelRoutes();
    $("modelLoading").querySelector("span:last-child").textContent = "灵曦正在准备…";
  </script>
</body>
</html>
