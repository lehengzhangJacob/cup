###############################################################################
#  LiveTalking Configuration
#  CLI arguments override values in this file
###############################################################################

# -------- Audio ----------------------------------------------------------
l: 10
m: 8
r: 4

# -------- Avatar Model ----------------------------------------------------------
model: wav2lip                 # musetalk / wav2lip / ultralight
avatar_id: lingshan_guide_v1
batch_size: 2                 # smaller batches reduce HTTP mouth-frame startup latency

# -------- Custom Actions ----------------------------------------------------------
customvideo_config: ''

# -------- TTS ----------------------------------------------------------
tts: edgetts                   # edgetts / gpt-sovits / cosyvoice / fishtts / tencent / doubao / indextts2 / azuretts / qwentts
REF_FILE: 'zh-CN-YunxiaNeural' # voice name or reference audio file path (wav, 16kHz, mono)
REF_TEXT: ''                   # reference text for voice cloning (English or Chinese)
TTS_SERVER: ''                 # TTS server URL, no trailing slash

# -------- Transport ----------------------------------------------------------
transport: webrtc              # rtcpush / webrtc / rtmp / virtualcam
stun: ''                      # LAN/local mode: host candidates are enough and avoid STUN delay
push_url: ''                   # push URL for rtcpush/rtmp (not needed for webrtc/virtualcam)
max_session: 2                 # cap per-session render workers to protect realtime playback
listenport: 8010
